services:
  db:
    image: postgres:16-alpine
    container_name: salon-postgres
    environment:
      POSTGRES_DB: salon
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon
    ports:
      - "5432:5432"
    volumes:
      - salon-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon -d salon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  salon-db-data:
